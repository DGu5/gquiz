<head>

<style>
body {
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: linear-gradient(#a1e3ff, #fef9c3);
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 38px; /* +20% */
}

.task {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
    font-size: 120%; /* +20% */
}

.task.wrong {
    background: #fee2e2;
    border: 3px solid #ef4444;
}

label {
    display: block;
    margin: 8px 0;
    cursor: pointer;
    font-size: 120%; /* +20% */
}

input[type="text"], input[type="number"] {
    font-size: 22px; /* padidinta */
    padding: 8px;
    width: 130px;
    text-align: center;
    margin-right: 10px;
}

button {
    display: block;
    margin: 30px auto;
    padding: 15px 35px;
    font-size: 28px; /* padidinta */
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#result {
    text-align: center;
    font-size: 26px; /* padidinta */
    margin-top: 20px;
}

#reward {
    display: none;
    background: #dcfce7;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    font-size: 28px; /* padidinta */
    margin-top: 30px;
}

.confetti {
    position: fixed;
    top: -10px;
    width: 12px;
    height: 12px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>
